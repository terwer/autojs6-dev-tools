name: manual-release-test

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 这次要打包的真实代码来源。测试当前开发代码通常填 dev；验证正式发布代码通常填 main；补已发布版本通常填正式 tag。
        required: true
        default: main
        type: string
      version:
        description: 本次包显示的版本号，例如 0.0.1。
        required: true
        type: string
      publish_to_release:
        description: 只有当你真的要把产物上传到 GitHub Release 时才打开。
        required: true
        default: false
        type: boolean
      release_tag:
        description: 要上传到哪个 Release tag；普通测试构建可留空。
        required: false
        type: string
      release_name:
        description: Release 标题；只有在上传到 GitHub Release 时才会用到。
        required: false
        type: string
      prerelease:
        description: 如果这次要创建新的 GitHub Release，是否标记为 prerelease。
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  manual-release-test:
    runs-on: windows-latest
    env:
      PRODUCT_NAME: AutoJS6 Visual Development Toolkit
      PACKAGE_IDENTITY_NAME: space.terwer.autojs6devtools
      PUBLISHER: CN=terwer
      PUBLISHER_DISPLAY_NAME: terwer
      APP_EXE_NAME: autojs6-dev-tools.exe
    steps:
      - name: Resolve build metadata
        id: meta
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use semantic format x.y.z. Actual: $version"
          }

          $tagInput = "${{ inputs.release_tag }}".Trim()
          $tag = if ([string]::IsNullOrWhiteSpace($tagInput)) { "test-v$version" } else { $tagInput }

          $nameInput = "${{ inputs.release_name }}".Trim()
          $name = if ([string]::IsNullOrWhiteSpace($nameInput)) { "Test Package v$version" } else { $nameInput }

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "release_tag=$tag"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "release_name=$name"

      - name: Check out selected source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Validate release metadata files
        shell: pwsh
        run: |
          Get-Content release-please-config.json -Raw | ConvertFrom-Json | Out-Null

          $manifest = Get-Content .release-please-manifest.json -Raw | ConvertFrom-Json
          $version = $manifest.'.'

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release manifest is missing the root package version."
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release manifest version must use semantic format x.y.z. Actual: $version"
          }

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore app project
        run: dotnet restore App/App.csproj

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Apply release metadata
        shell: pwsh
        run: >
          ./scripts/release/Set-AppReleaseMetadata.ps1
          -Version "${{ steps.meta.outputs.version }}"
          -ProductName "${env:PRODUCT_NAME}"
          -PackageIdentityName "${env:PACKAGE_IDENTITY_NAME}"
          -Publisher "${env:PUBLISHER}"
          -PublisherDisplayName "${env:PUBLISHER_DISPLAY_NAME}"

      - name: Create signing certificate
        id: cert
        shell: pwsh
        run: >
          ./scripts/release/New-CodeSigningCertificate.ps1
          -Subject "${env:PUBLISHER}"
          -OutputDirectory "artifacts/signing"

      - name: Build x64 portable ZIP
        shell: pwsh
        run: >
          ./scripts/release/Build-PortablePackage.ps1
          -ProjectPath "App/App.csproj"
          -RuntimeIdentifier "win-x64"
          -Version "${{ steps.meta.outputs.version }}"
          -OutputRoot "artifacts"

      - name: Build ARM64 portable ZIP
        shell: pwsh
        run: >
          ./scripts/release/Build-PortablePackage.ps1
          -ProjectPath "App/App.csproj"
          -RuntimeIdentifier "win-arm64"
          -Version "${{ steps.meta.outputs.version }}"
          -OutputRoot "artifacts"

      - name: Build x64 installer
        shell: pwsh
        run: >
          ./scripts/release/Build-InnoInstaller.ps1
          -ScriptPath "packaging/windows/autojs6-dev-tools.iss"
          -RuntimeIdentifier "win-x64"
          -Version "${{ steps.meta.outputs.version }}"
          -SourceDirectory "artifacts/publish/win-x64"
          -OutputDirectory "artifacts/release-assets"
          -ArchitecturesAllowed "x64compatible"
          -ArchitecturesInstallIn64BitMode "x64compatible"

      - name: Build ARM64 installer
        shell: pwsh
        run: >
          ./scripts/release/Build-InnoInstaller.ps1
          -ScriptPath "packaging/windows/autojs6-dev-tools.iss"
          -RuntimeIdentifier "win-arm64"
          -Version "${{ steps.meta.outputs.version }}"
          -SourceDirectory "artifacts/publish/win-arm64"
          -OutputDirectory "artifacts/release-assets"
          -ArchitecturesAllowed "arm64"
          -ArchitecturesInstallIn64BitMode "arm64"

      - name: Build x64 MSIX
        shell: pwsh
        run: >
          ./scripts/release/Build-MsixPackage.ps1
          -ProjectPath "App/App.csproj"
          -Platform "x64"
          -RuntimeIdentifier "win-x64"
          -Version "${{ steps.meta.outputs.version }}"
          -OutputRoot "artifacts"
          -PackageCertificatePath "${{ steps.cert.outputs.pfx_path }}"
          -PackageCertificatePassword "${{ steps.cert.outputs.password }}"

      - name: Build ARM64 MSIX
        shell: pwsh
        run: >
          ./scripts/release/Build-MsixPackage.ps1
          -ProjectPath "App/App.csproj"
          -Platform "ARM64"
          -RuntimeIdentifier "win-arm64"
          -Version "${{ steps.meta.outputs.version }}"
          -OutputRoot "artifacts"
          -PackageCertificatePath "${{ steps.cert.outputs.pfx_path }}"
          -PackageCertificatePassword "${{ steps.cert.outputs.password }}"

      - name: Prepare output files
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "packaging/windows/MSIX-INSTALL.md" -Destination "artifacts/release-assets/MSIX-INSTALL.md" -Force
          Copy-Item -LiteralPath "${{ steps.cert.outputs.cer_path }}" -Destination "artifacts/release-assets/autojs6-dev-tools-signing.cer" -Force

          @(
            "source_ref=${{ inputs.source_ref }}",
            "version=${{ steps.meta.outputs.version }}",
            "release_tag=${{ steps.meta.outputs.release_tag }}",
            "publish_to_release=${{ inputs.publish_to_release }}",
            "prerelease=${{ inputs.prerelease }}"
          ) | Set-Content -LiteralPath "artifacts/release-assets/BUILD-INFO.txt"

          $hashLines = Get-ChildItem -LiteralPath "artifacts/release-assets" -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash *$($_.Name)"
            }

          Set-Content -LiteralPath "artifacts/release-assets/SHA256SUMS.txt" -Value $hashLines

      - name: Upload build results to Actions artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-package-${{ steps.meta.outputs.version }}
          path: artifacts/release-assets/*
          if-no-files-found: error

      - name: Upload files to GitHub Release
        if: ${{ inputs.publish_to_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.release_tag }}"
          $name = "${{ steps.meta.outputs.release_name }}"
          $target = "${{ inputs.source_ref }}"

          gh release view $tag --json tagName > $null 2>&1
          $releaseExists = $LASTEXITCODE -eq 0

          if (-not $releaseExists) {
            $createArgs = @('release', 'create', $tag, '--title', $name, '--target', $target, '--notes', "Test package build for $tag from $target")
            if ("${{ inputs.prerelease }}" -eq 'true') {
              $createArgs += '--prerelease'
            }

            & gh @createArgs

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub Release $tag"
            }
          } else {
            gh release edit $tag --title "$name"

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update GitHub Release title for $tag"
            }
          }

          gh release upload $tag artifacts/release-assets/* --clobber

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets to $tag"
          }
